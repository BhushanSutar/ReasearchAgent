<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Research Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --bg:            #080810;
      --surface:       #0f0f1a;
      --surface2:      #13131f;
      --border:        #1c1c2e;
      --border-hover:  #2e2e48;

      --accent:        #7c6aff;
      --accent-dim:    rgba(124,106,255,0.12);
      --accent-glow:   rgba(124,106,255,0.25);
      --accent3:       #4dffc8;
      --accent3-dim:   rgba(77,255,200,0.1);
      --warn:          #ff6b6b;
      --warn-dim:      rgba(255,107,107,0.1);
      --gold:          #ffd06a;
      --gold-dim:      rgba(255,208,106,0.1);

      --text:          #e4e4f0;
      --text-muted:    #6b6b8a;
      --text-dim:      #9090b0;

      /* per-stage colors */
      --c-search:  #7c6aff;
      --c-reader:  #4dffc8;
      --c-writer:  #ffd06a;
      --c-critic:  #ff6b6b;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,106,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 52px 24px 100px;
      position: relative; z-index: 1;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.5s ease both;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(124,106,255,0.35);
      padding: 5px 16px;
      border-radius: 2px;
      margin-bottom: 22px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 800;
      line-height: 1.08;
      background: linear-gradient(135deg, #fff 10%, var(--accent) 55%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.12em;
    }

    /* ── Search bar ──────────────────────────────────────────────────────── */
    .search-wrap {
      margin-bottom: 36px;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .search-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .prefix {
      padding: 0 18px;
      color: var(--accent);
      font-size: 13px;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #topic-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      padding: 16px 18px;
      caret-color: var(--accent);
    }

    #topic-input::placeholder { color: var(--text-muted); }

    #run-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 28px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
      height: 52px;
    }

    #run-btn:hover:not(:disabled) { background: #6a58e8; }
    #run-btn:active:not(:disabled) { transform: scale(0.97); }
    #run-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    /* ── Pipeline tracker ────────────────────────────────────────────────── */
    .tracker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 32px;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .t-step {
      background: var(--surface);
      padding: 14px 8px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: background 0.3s, color 0.3s;
      position: relative;
    }

    .t-step .icon  { display: block; font-size: 20px; margin-bottom: 5px; }
    .t-step .label { display: block; }

    /* active shimmer */
    .t-step.active {
      background: var(--surface2);
      color: var(--text);
    }
    .t-step.active::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: var(--stage-color, var(--accent));
      animation: shimmer 1.8s linear infinite;
    }

    .t-step.done { color: var(--accent3); }
    .t-step.done::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: var(--accent3);
    }

    /* per-step accent */
    .t-step[data-step="search"] { --stage-color: var(--c-search); }
    .t-step[data-step="reader"] { --stage-color: var(--c-reader); }
    .t-step[data-step="writer"] { --stage-color: var(--c-writer); }
    .t-step[data-step="critic"] { --stage-color: var(--c-critic); }

    .t-step.active { color: var(--stage-color, var(--text)); }

    /* ── Panels ──────────────────────────────────────────────────────────── */
    .panels { display: flex; flex-direction: column; gap: 16px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .panel.visible { display: block; }
    .panel.shown   { opacity: 1; transform: translateY(0); }

    /* per-panel left accent border */
    .panel[data-panel="search"] { border-left: 3px solid var(--c-search); }
    .panel[data-panel="reader"] { border-left: 3px solid var(--c-reader); }
    .panel[data-panel="writer"] { border-left: 3px solid var(--c-writer); }
    .panel[data-panel="critic"] { border-left: 3px solid var(--c-critic); }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .panel-header:hover { background: rgba(255,255,255,0.02); }

    .p-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .panel[data-panel="search"] .p-dot { background: var(--c-search); box-shadow: 0 0 8px var(--c-search); }
    .panel[data-panel="reader"] .p-dot { background: var(--c-reader); box-shadow: 0 0 8px var(--c-reader); }
    .panel[data-panel="writer"] .p-dot { background: var(--c-writer); box-shadow: 0 0 8px var(--c-writer); }
    .panel[data-panel="critic"] .p-dot { background: var(--c-critic); box-shadow: 0 0 8px var(--c-critic); }

    .p-title {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex: 1;
    }

    .badge {
      font-size: 9px;
      padding: 3px 9px;
      border-radius: 3px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .badge-running { background: var(--accent-dim);  color: var(--accent);  border: 1px solid rgba(124,106,255,0.25); }
    .badge-done    { background: var(--accent3-dim); color: var(--accent3); border: 1px solid rgba(77,255,200,0.2);   }

    .p-actions { display: flex; align-items: center; gap: 8px; }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }

    .p-toggle { color: var(--text-muted); font-size: 11px; transition: transform 0.25s; }
    .panel.collapsed .p-toggle { transform: rotate(-90deg); }

    /* Body */
    .panel-body {
      padding: 24px;
      max-height: 480px;
      overflow-y: auto;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }

    .panel[data-panel="writer"] .panel-body { max-height: 640px; }
    .panel.collapsed .panel-body { max-height: 0 !important; padding: 0 24px; overflow: hidden; }

    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

    /* ── Markdown content rendering ──────────────────────────────────────── */
    .md {
      font-size: 13.5px;
      line-height: 1.85;
      color: var(--text-dim);
    }

    .md h1, .md h2, .md h3, .md h4 {
      font-family: 'Syne', sans-serif;
      color: var(--text);
      margin: 20px 0 8px;
      line-height: 1.3;
    }
    .md h1 { font-size: 22px; }
    .md h2 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .md h3 { font-size: 15px; color: var(--text-dim); }
    .md h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }

    .md p { margin: 8px 0; }

    .md ul, .md ol { margin: 10px 0 10px 22px; }
    .md li { margin: 5px 0; }

    .md strong { color: var(--text); font-weight: 700; }
    .md em     { color: var(--accent3); font-style: italic; }

    .md code {
      background: rgba(124,106,255,0.1);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
    }

    .md pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .md pre code {
      background: none;
      color: var(--text-dim);
      padding: 0;
      font-size: 12.5px;
    }

    .md a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(124,106,255,0.3);
      transition: border-color 0.2s;
    }
    .md a:hover { border-color: var(--accent); }

    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 12px 0;
      color: var(--text-muted);
      background: var(--accent-dim);
      border-radius: 0 4px 4px 0;
    }

    .md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* Score table (critic) */
    .md table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 13px;
    }
    .md th, .md td {
      padding: 9px 14px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .md th {
      background: var(--surface2);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .md tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

    .md .score-badge {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--accent);
      margin: 4px 0 16px;
    }

    /* Error block */
    .error-block {
      color: var(--warn);
      background: var(--warn-dim);
      border: 1px solid rgba(255,107,107,0.25);
      border-radius: 4px;
      padding: 14px 18px;
      font-size: 13px;
    }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    #status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10,10,18,0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 11px 24px;
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 12px;
      color: var(--text-muted);
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    #status-bar.open { transform: translateY(0); }

    .s-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease infinite;
    }

    #status-bar.complete .s-dot {
      background: var(--accent3);
      animation: none;
    }

    /* ── Animations ──────────────────────────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-14px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.45; transform:scale(0.75); }
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(200%); }
    }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      .t-step .label { display: none; }
      #run-btn { padding: 0 18px; }
      .prefix  { padding: 0 12px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ── Header ── -->
  <header>
    <span class="tag">AI Research Pipeline</span>
    <h1>Deep Research<br>Engine</h1>
    <p class="subtitle">Search &rarr; Scrape &rarr; Analyze &rarr; Critique</p>
  </header>

  <!-- ── Search bar ── -->
  <div class="search-wrap">
    <div class="search-bar">
      <span class="prefix">~/research $</span>
      <input
        id="topic-input"
        type="text"
        placeholder="Enter your research topic..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="run-btn">Run Pipeline</button>
    </div>
  </div>

  <!-- ── Pipeline tracker ── -->
  <div class="tracker">
    <div class="t-step" data-step="search"><span class="icon">🔍</span><span class="label">Search</span></div>
    <div class="t-step" data-step="reader"><span class="icon">📄</span><span class="label">Reader</span></div>
    <div class="t-step" data-step="writer"><span class="icon">✍️</span><span class="label">Writer</span></div>
    <div class="t-step" data-step="critic"><span class="icon">🧐</span><span class="label">Critic</span></div>
  </div>

  <!-- ── Panels ── -->
  <div class="panels">

    <div class="panel" id="panel-search" data-panel="search">
      <div class="panel-header" onclick="togglePanel('search')">
        <span class="p-dot"></span>
        <span class="p-title">Search Results</span>
        <span class="badge badge-running" id="badge-search">Searching...</span>
        <span class="panel-toggle p-toggle">▾</span>
      </div>
      <div class="panel-body">
        <div class="md" id="content-search"></div>
      </div>
    </div>

    <div class="panel" id="panel-reader" data-panel="reader">
      <div class="panel-header" onclick="togglePanel('reader')">
        <span class="p-dot"></span>
        <span class="p-title">Scraped Sources</span>
        <span class="badge badge-running" id="badge-reader">Scraping...</span>
        <span class="panel-toggle p-toggle">▾</span>
      </div>
      <div class="panel-body">
        <div class="md" id="content-reader"></div>
      </div>
    </div>

    <div class="panel" id="panel-writer" data-panel="writer">
      <div class="panel-header" onclick="togglePanel('writer')">
        <span class="p-dot"></span>
        <span class="p-title">Research Report</span>
        <span class="badge badge-running" id="badge-writer">Writing...</span>
        <div class="p-actions" onclick="event.stopPropagation()">
          <button class="action-btn" id="copy-btn" onclick="copyReport()">Copy</button>
        </div>
        <span class="panel-toggle p-toggle">▾</span>
      </div>
      <div class="panel-body">
        <div class="md" id="content-writer"></div>
      </div>
    </div>

    <div class="panel" id="panel-critic" data-panel="critic">
      <div class="panel-header" onclick="togglePanel('critic')">
        <span class="p-dot"></span>
        <span class="p-title">Editorial Review</span>
        <span class="badge badge-running" id="badge-critic">Reviewing...</span>
        <span class="panel-toggle p-toggle">▾</span>
      </div>
      <div class="panel-body">
        <div class="md" id="content-critic"></div>
      </div>
    </div>

  </div>
</div>

<!-- ── Status bar ── -->
<div id="status-bar">
  <span class="s-dot"></span>
  <span id="status-text">Initializing...</span>
</div>

<script>
  // ── Marked config ──────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  // ── State ──────────────────────────────────────────────────────────────────
  let es = null;         // EventSource
  let reportText = '';   // raw report text for copy

  // ── Helpers ────────────────────────────────────────────────────────────────

  function togglePanel(name) {
    document.getElementById(`panel-${name}`).classList.toggle('collapsed');
  }

  function showPanel(name, markdown) {
    const panel = document.getElementById(`panel-${name}`);
    const content = document.getElementById(`content-${name}`);
    const badge = document.getElementById(`badge-${name}`);

    panel.classList.add('visible');
    // Trigger CSS transition on next frame
    requestAnimationFrame(() => requestAnimationFrame(() => panel.classList.add('shown')));

    content.innerHTML = marked.parse(markdown || '_No content._');

    badge.textContent = 'Done';
    badge.className = 'badge badge-done';
  }

  function showError(message) {
    ['search','reader','writer','critic'].forEach(name => {
      const panel = document.getElementById(`panel-${name}`);
      if (!panel.classList.contains('shown')) {
        panel.classList.add('visible');
        requestAnimationFrame(() => requestAnimationFrame(() => panel.classList.add('shown')));
        document.getElementById(`content-${name}`).innerHTML =
          `<div class="error-block">⚠️ ${message}</div>`;
        document.getElementById(`badge-${name}`).className = 'badge badge-running';
        document.getElementById(`badge-${name}`).textContent = 'Error';
      }
    });
  }

  function setStep(name) {
    document.querySelectorAll('.t-step').forEach(el => el.classList.remove('active'));
    const el = document.querySelector(`.t-step[data-step="${name}"]`);
    if (el) el.classList.add('active');
  }

  function doneStep(name) {
    const el = document.querySelector(`.t-step[data-step="${name}"]`);
    if (el) { el.classList.remove('active'); el.classList.add('done'); }
  }

  function setStatus(msg, complete = false) {
    const bar = document.getElementById('status-bar');
    bar.classList.add('open');
    bar.classList.toggle('complete', complete);
    document.getElementById('status-text').textContent = msg;
  }

  function resetUI() {
    ['search','reader','writer','critic'].forEach(name => {
      const panel = document.getElementById(`panel-${name}`);
      panel.classList.remove('visible','shown','collapsed');
      panel.style.display = '';
      document.getElementById(`content-${name}`).innerHTML = '';
      const badge = document.getElementById(`badge-${name}`);
      badge.className = 'badge badge-running';
      badge.textContent = { search:'Searching...', reader:'Scraping...', writer:'Writing...', critic:'Reviewing...' }[name];
    });
    document.querySelectorAll('.t-step').forEach(el => el.classList.remove('active','done'));
    const bar = document.getElementById('status-bar');
    bar.classList.remove('open','complete');
    reportText = '';
  }

  function copyReport() {
    if (!reportText) return;
    navigator.clipboard.writeText(reportText).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied ✓';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  // ── Pipeline runner ────────────────────────────────────────────────────────

  function runPipeline() {
    const topic = document.getElementById('topic-input').value.trim();
    if (!topic) { document.getElementById('topic-input').focus(); return; }

    if (es) { es.close(); es = null; }
    resetUI();

    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = 'Running...';
    setStatus('Starting pipeline...');

    es = new EventSource(`/run?topic=${encodeURIComponent(topic)}`);

    es.addEventListener('status', e => {
      const d = JSON.parse(e.data);
      setStatus(d.message);
      setStep(d.step);
    });

    es.addEventListener('search_done', e => {
      const d = JSON.parse(e.data);
      doneStep('search');
      showPanel('search', d.content);
    });

    es.addEventListener('reader_done', e => {
      const d = JSON.parse(e.data);
      doneStep('reader');
      showPanel('reader', d.content);
    });

    es.addEventListener('report_done', e => {
      const d = JSON.parse(e.data);
      doneStep('writer');
      reportText = d.content;
      showPanel('writer', d.content);
    });

    es.addEventListener('critique_done', e => {
      const d = JSON.parse(e.data);
      doneStep('critic');
      showPanel('critic', d.content);
    });

    es.addEventListener('done', () => {
      es.close(); es = null;
      btn.disabled = false;
      btn.textContent = 'Run Pipeline';
      setStatus('✅ Research complete.', true);
    });

    es.addEventListener('error', e => {
      try {
        const d = JSON.parse(e.data);
        setStatus(`❌ ${d.message}`);
        showError(d.message);
      } catch { /* SSE connection error */ }
      es.close(); es = null;
      btn.disabled = false;
      btn.textContent = 'Run Pipeline';
    });
  }

  // ── Event bindings ─────────────────────────────────────────────────────────
  document.getElementById('run-btn').addEventListener('click', runPipeline);
  document.getElementById('topic-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') runPipeline();
  });
</script>
</body>
</html>
